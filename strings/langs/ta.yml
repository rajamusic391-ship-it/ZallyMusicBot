start_2 : "<u>ஹே {0} !\nஇது {1} 💫</u>\n\n<blockquote><b>🎧 இசையை உணர தயாரா?</b></blockquote>\n➜ நான் ஒரு சூப்பர்-ஃபாஸ்ட் & சக்திவாய்ந்த டெலிகிராம் இசை போட்,\n➜ தொடர்ந்து இசையை அற்புதமான அம்சங்களுடன் கொண்டு வர வடிவமைக்கப்பட்டது 🎶\n\n<blockquote><b>🧭 என் சக்திகளை ஆராய விரும்புகிறீர்களா?</b></blockquote>\n➜ <b>உதவி & கட்டளைகள்</b> பொத்தானைத் தட்டவும்\n➜ நான் என்ன செய்ய முடியும் என்பதைக் கண்டறியவும் 🚀"
start_3 : "<blockquote>ஹே {0},</blockquote>\n<blockquote>இது {1}</blockquote>\n\n<blockquote>{2} இல் என்னைச் சேர்த்ததற்கு நன்றி, {3} இப்போது இந்த அரட்டையில் பாடல்களை வாசிக்க முடியும்.</blockquote>"
start_4 : "<blockquote>🎄 <b>சூப்பர்குழு தேவை</b> 🎄</blockquote>\n\n<blockquote>உங்கள் <b>குழுவை</b> <b>சூப்பர்குழுவாக</b> மாற்றி மீண்டும் என்னைச் சேர்க்கவும்.</blockquote>\n\n<blockquote><b>சூப்பர்குழுவை எப்படி உருவாக்குவது?</b></blockquote>\n<blockquote>- உங்கள் குழுவின் அரட்டை வரலாற்றை <b>காணக்கூடியதாக</b> ஒரு முறை செய்யவும்.</blockquote>"
start_5 : "<blockquote><b>↝ கருப்பு பட்டியலில் உள்ள அரட்டை ↜</b></blockquote>\n\n<blockquote>இந்த அரட்டை {0} தரவுத்தளத்தில் கருப்பு பட்டியலில் உள்ளது.</blockquote>\n<blockquote><a href={1}>சூடோ பயனரிடம்</a> கோரிக்கை செய்யவும் அல்லது <a href={2}>ஆதரவு அரட்டைக்கு</a> வரவும்.</blockquote>"
start_6 : "<blockquote>😲 <b>பாடல் தகவல்</b> 😲</blockquote>\n\n<blockquote>📌 <b>தலைப்பு :</b> {0}</blockquote>\n<blockquote>⏳ <b>கால அளவு :</b> {1} நிமிடங்கள்</blockquote>\n<blockquote>👀 <b>பார்வைகள் :</b> <code>{2}</code></blockquote>\n<blockquote>⏰ <b>வெளியிடப்பட்ட தேதி :</b> {3}</blockquote>\n<blockquote>📎 <b>சேனல் :</b> <a href={4}>{5}</a></blockquote>\n\n<blockquote><u><b>🥀 தேடல் சக்தி {6}</b></u></blockquote>"

help_1 : "<blockquote>உங்களுக்கு உதவி தேவையான வகையைத் தேர்ந்தெடுக்கவும்.</blockquote>\n<blockquote>உங்கள் சந்தேகங்களை <a href={0}>ஆதரவு அரட்டையில்</a> கேளுங்கள்</blockquote>\n\n<blockquote>அனைத்து கட்டளைகளும் பயன்படுத்தப்படலாம் : <code>/</code></blockquote>"
help_2 : "<blockquote>உங்கள் PM இல் எனது உதவி மெனுவைப் பெற கீழே உள்ள பொத்தான்களைக் கிளிக் செய்யவும்.</blockquote>"

lang_1 : "» இந்த குழுவின் இயல்புநிலை மொழியாக அமைக்க விரும்பும் மொழியைத் தேர்ந்தெடுக்கவும் :"
lang_2 : "மொழி வெற்றிகரமாக மாற்றப்பட்டது."
lang_3 : "மொழியை மாற்ற முடியவில்லை."
lang_4 : "நீங்கள் ஏற்கனவே அதே மொழியில் இருக்கிறீர்கள்."

setting_1 : "<u><b>{0} அமைப்புகள் பேனல்</b></u>\n\n<b>அரட்டை ஐடி :</b> <code>{1}</code>\n<b>அரட்டை தலைப்பு :</b> {2}\n\nஅமைப்புகளை மாற்ற கீழே உள்ள பொத்தான்களைக் கிளிக் செய்யவும்."
setting_2 : "» நேரடி : தேடல் கோரிக்கைகளை நேரடியாக வாசிக்கிறது.\n\n» இன்லைன் : வீடியோ மற்றும் ஆடியோக்களுக்கு இடையே தேர்வு செய்ய இன்லைன் பொத்தான்களை வழங்குகிறது."
setting_3 : "» அனைவரும் : இந்த குழுவில் யாரும் நிர்வாகி கட்டளைகளை [தவிர்க்க, இடைநிறுத்த, தொடர் போன்றவை] பயன்படுத்தலாம்.\n\n» நிர்வாகிகள் மட்டும் : நிர்வாகிகள் மற்றும் அங்கீகரிக்கப்பட்ட பயனர்கள் மட்டுமே நிர்வாகி கட்டளைகளைப் பயன்படுத்தலாம்."
setting_4 : "» அங்கீகரிக்கப்பட்ட பயனர்கள் யாரும் கிடைக்கவில்லை."
setting_5 : "» குழு : கட்டளை கொடுக்கப்பட்ட குழுவில் இசையை வாசிக்கிறது.\n\n» சேனல் : நீங்கள் விரும்பும் சேனலில் இசையை வாசிக்கிறது. சேனல் ஐடியை /channelplay மூலம் அமைக்கவும்"
setting_6 : "» அனைவரும் : இந்த குழுவில் உள்ள யாரும் இங்கே இசையை வாசிக்கலாம்.\n\n» நிர்வாகிகள் மட்டும்: நிர்வாகிகள் மட்டுமே இந்த குழுவில் இசையை வாசிக்க முடியும்."
setting_7 : "» தயவுசெய்து சேனல் ஐடியை /channelplay மூலம் வரையறுக்கவும்"
setting_8 : "இந்த முறை இயக்கப்பட்டால், நிர்வாகி உரிமைகள் இல்லாதவர்கள் ஒரு குறிப்பிட்ட அளவு வாக்குகளுக்குப் பிறகு நிர்வாகி கட்டளைகளைப் பயன்படுத்தலாம்."
