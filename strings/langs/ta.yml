cplay_4 : "» சேனலைப் பெற முடியவில்லை.\n\nபோட்டை உங்கள் சேனலில் சேர்த்து நிர்வாகியாக உயர்த்தியுள்ளீர்கள் என்பதை உறுதிப்படுத்தவும்."
cplay_5 : "சேனல்கள் மட்டுமே ஆதரிக்கப்படுகின்றன."
cplay_6 : "» சேனலை {0} இந்த குழுவுடன் இணைக்க அந்த சேனலின் <b>உரிமையாளராக</b> இருக்க வேண்டும்.\n<b>சேனலின் உரிமையாளர் :</b> @{1}\n\nமாற்றாக, நீங்கள் உங்கள் குழுவை அந்த சேனலுடன் இணைத்து <code>/channelplay linked</code> மூலம் இணைக்க முயற்சிக்கலாம்"
